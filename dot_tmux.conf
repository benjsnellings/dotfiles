# reload tmux with
# # :source-file ~/.tmux.conf
# # or
# # tmux source-file ~/.tmux.conf

# Set window numbering to start at 1
set -g base-index 1
setw -g pane-base-index 1

# Set vi mode
setw -g mode-keys vi

# remap prefix to Control + a
set -g prefix C-a
# bind 'C-a C-a' to type 'C-a'
bind C-a send-prefix
unbind C-b

# VIM Style Navigation
#bind h select-pane -L
#bind j select-pane -D
#bind k select-pane -U
#bind l select-pane -R

# Resize panes
bind-key J resize-pane -D 15
bind-key K resize-pane -U 15
bind-key H resize-pane -L 15
bind-key L resize-pane -R 15

# Vim things????
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R
# bind-key -n C-\ select-pane -l

# Move left/right between WINDOWS (no prefix), mirroring the C-h/C-l pane keys.
# Alt(=Option on macOS, needs Option-as-Meta, same as M-u below).
bind-key -n M-h previous-window
bind-key -n M-l next-window
# Alt+Shift to reorder the current window; focus follows it.
bind-key -n M-H swap-window -t -1 \; previous-window
bind-key -n M-L swap-window -t +1 \; next-window

# Bind the copy-mode key
bind-key / copy-mode

# ensure tmux is not waiting on escape
set -s escape-time 0

# Restore C-l for clear screen
bind C-l send-keys 'C-l'

# alt-u to change session root
bind -n M-u attach-session -t . -c '#{pane_current_path}'

# Pane switcher with a bottom-aligned preview (newest output at the bottom).
# Provided by the fzf-pane-switch.tmux plugin (see Plugins section below), which
# previews via `capture-pane -ep` instead of choose-tree's cursor-centered preview.
# Options for the plugin are set in the Plugins section.

# Disable mouse 
set -g mouse off

# Enable mouse
# setw -g mouse on

# Set window name to current Dir
set-option -g status-interval 5
set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{s|/local/home/snellin/workspace|~|:pane_current_path}':

###  Set Pane Border visiblity
# Set the color of the inactive pane borders
set -g pane-border-style "fg=colour238"
# Set the color of the active pane border
set -g pane-active-border-style "fg=colour51"

## Set active and inactive windows to different colors
set -g window-active-style bg="#15191e"     
set -g window-style bg="#3f3f3f"     
# set -g window-style bg="#30353bff"          

set-option -g set-titles on


# Status Bar
# Styled by the niksingh710/minimal-tmux-status plugin (configured in the
# Plugins section below). The plugin sets status-style to bg=default,fg=default,
# so the bar inherits the terminal background instead of the old hard-coded
# green/black that clobbered the window-text colors.

# Toggle the status bar with prefix-b
bind-key b set-option status


# Plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'kristijan/fzf-pane-switch.tmux'
set -g @plugin 'niksingh710/minimal-tmux-status'

# fzf-pane-switch.tmux: fuzzy pane switcher across all sessions.
# Preview uses `capture-pane -ep` => visible viewport, newest output at the bottom.
set -g @fzf_pane_switch_bind-key 'w'                              # bind to prefix-w (was choose-tree)
set -g @fzf_pane_switch_preview-pane-position 'down,70%,wrap'     # preview below the list, not on the right

# minimal-tmux-status: lean status bar with a zellij-style prefix indicator.
# https://github.com/niksingh710/minimal-tmux-status
# Config is read when the plugin runs at tpm load time, so it must precede tpm.
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#698DDA"          # accent: prefix pill + current-window highlight
set -g @minimal-tmux-justify "centre"      # windows centered in the status bar
set -g @minimal-tmux-indicator-str " tmux " # shows only while the prefix (C-a) is pending
# Font-safe defaults (no Nerd Font required): no powerline arrows, ASCII zoom marker.
# If your terminal renders Nerd Font glyphs, set use-arrow true and swap the icon below.
set -g @minimal-tmux-use-arrow false
set -g @minimal-tmux-expanded-icon "[Z] "  # marks a zoomed pane; use "󰊓 " with a Nerd Font

# Left extra: the SESSION root directory (where a new pane would open), not the
# visible pane's cwd -- so it's stable as you move between panes. session_path is
# already in the $HOME (/home/snellin) form. Collapse HOME/home-subdirs to ~, then
# always shorten to the last two segments (e.g. ~/workspace/Foo/src/Bar -> src/Bar).
# Must be single-quoted: the \1 backreference would trip tmux's parser in "..".
set -g @minimal-tmux-status-left-extra ' #[fg=#698DDA,bold]#{s|.*/([^/]+/[^/]+)$|\1|:#{s|^/home/snellin$|~|:#{s|^/home/snellin/|~/|:session_path}}}#[default]'

# Right: session name, then per-window the Claude Code session when claude is the
# running command. Claude publishes its task name via the terminal title
# (#{pane_title}); strip its leading braille spinner char with s/^. //. No length
# cap -- tmux clips the bar if it fills. Non-claude windows fall back to #W.
set -g @minimal-tmux-status-right "#S"
set -g @minimal-tmux-window-status-format ' #I:#{?#{==:#{pane_current_command},claude},#{s/^. //:pane_title},#W} '

set -g status-left-length 40
set -g status-right-length 20

# set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

